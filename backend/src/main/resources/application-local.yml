spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/piano_db
    username: piano
    password: piano1234
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    show-sql: true

app:
  jwt:
    secret: local-dev-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
    access-token-expiry: 1800000
    refresh-token-expiry: 1209600000
  cors:
    allowed-origins: http://localhost:3000

logging:
  level:
    org.hibernate.orm.jdbc.bind: TRACE
