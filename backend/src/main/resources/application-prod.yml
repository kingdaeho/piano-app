spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    url: ${FLYWAY_DATABASE_URL:${DATABASE_URL}}
    user: ${FLYWAY_DATABASE_USERNAME:${DATABASE_USERNAME}}
    password: ${FLYWAY_DATABASE_PASSWORD:${DATABASE_PASSWORD}}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:true}

  jpa:
    show-sql: false

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: ${JWT_ACCESS_EXPIRY:1800000}
    refresh-token-expiry: ${JWT_REFRESH_EXPIRY:1209600000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

logging:
  level:
    com.pianocompanion: INFO
    org.hibernate.SQL: WARN
