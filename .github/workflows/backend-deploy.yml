# Backend Deploy - Render 배포 확인
#
# Render는 GitHub 연동으로 main push 시 자동 배포됩니다.
# 이 워크플로우는 배포 후 헬스체크만 수행합니다.
#
# 필요한 GitHub Variables:
#   BACKEND_HEALTH_URL - 배포된 백엔드 헬스체크 URL
#                        예: https://piano-app-qzoa.onrender.com/actuator/health

name: Backend Deploy Check

on:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: backend-deploy
  cancel-in-progress: false

jobs:
  healthcheck:
    name: Health Check
    runs-on: ubuntu-latest
    if: vars.BACKEND_HEALTH_URL != ''

    steps:
      - name: Wait for Render deployment
        run: sleep 60

      - name: Health check
        run: |
          MAX_RETRIES=5
          RETRY_INTERVAL=15
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Health check attempt $i/$MAX_RETRIES..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.BACKEND_HEALTH_URL }}" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            echo "Status: $STATUS. Retrying in ${RETRY_INTERVAL}s..."
            sleep $RETRY_INTERVAL
          done
          echo "Health check failed after $MAX_RETRIES attempts."
          exit 1
