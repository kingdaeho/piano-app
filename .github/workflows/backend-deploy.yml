# Backend Deploy - Railway 배포
#
# 필요한 GitHub Secrets:
#   RAILWAY_TOKEN  - Railway API 토큰
#                    Railway 대시보드 > Account Settings > Tokens에서 생성
#                    GitHub 리포 > Settings > Secrets and variables > Actions에서 등록
#
#   RAILWAY_SERVICE_ID - Railway 서비스 ID (선택, 프로젝트에 서비스가 여러 개일 때)
#                        Railway 대시보드 > 서비스 > Settings에서 확인
#
#   BACKEND_HEALTH_URL - 배포된 백엔드 헬스체크 URL (예: https://your-app.railway.app/actuator/health)
#                        Spring Boot Actuator가 활성화되어 있어야 합니다.

name: Backend Deploy

on:
  workflow_dispatch:
  workflow_call:

defaults:
  run:
    working-directory: backend

concurrency:
  group: backend-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build JAR
        run: ./gradlew build -x test

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  healthcheck:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    if: vars.BACKEND_HEALTH_URL != ''

    steps:
      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Health check
        run: |
          MAX_RETRIES=5
          RETRY_INTERVAL=10
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Health check attempt $i/$MAX_RETRIES..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.BACKEND_HEALTH_URL }}" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            echo "Status: $STATUS. Retrying in ${RETRY_INTERVAL}s..."
            sleep $RETRY_INTERVAL
          done
          echo "Health check failed after $MAX_RETRIES attempts."
          exit 1
