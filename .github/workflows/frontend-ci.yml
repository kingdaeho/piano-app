# Frontend CI - Next.js 린트 및 빌드 검증
#
# 필요한 GitHub Secrets:
#   (없음 - Vercel이 자동 배포하므로 CI에서는 검증만 수행)
#
# Vercel GitHub 연동이 별도로 설정되어 있어야 합니다.
# Vercel 대시보드에서 GitHub 리포지토리를 연결하면 push 시 자동 배포됩니다.

name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

defaults:
  run:
    working-directory: frontend

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
